version: '3.9'

services:
  minio:
    image: minio/minio
    container_name: cloudstash-minio

    command: server /data --console-address ":9001"

    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123

    ports:
      - "9000:9000"
      - "9001:9001"

    volumes:
      - minio-data:/data

volumes:
  minio-data: